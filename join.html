<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Helvetica Neue,Helvetica,Arial,sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column}

  /* TOP BAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #f0f0f0}
  .topbar-left{display:flex;align-items:center;gap:14px}

  .wa-brand span{font-size:19px;color:#41525d;font-weight:400}
  .download-icon{width:34px;height:34px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}

  /* MAIN CONTENT */
  .content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
  .group-icon-wrap{width:140px;height:140px;border-radius:50%;margin-bottom:28px;overflow:hidden;border:1px solid #eee;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fbbf24,#84cc16,#3b82f6)}

  .group-icon-fallback{font-size:52px}

  .group-name{font-size:21px;color:#111b21;font-weight:400;margin-bottom:6px;max-width:320px}
  .group-sub{font-size:15px;color:#667781;margin-bottom:32px}

  .join-btn:hover{background:#008f72}
  .join-btn:disabled{opacity:.7;cursor:default}

  .divider-line{width:100%;max-width:320px;height:1px;background:#eee;margin-bottom:20px}
  .no-wa-text{font-size:14px;color:#667781;margin-bottom:10px}
  .download-link{font-size:14px;color:#027eb5;text-decoration:none;font-weight:600}

  .redirect-msg{font-size:13px;color:#8696a0;margin-top:18px}
  .spinner{width:16px;height:16px;border:2px solid #d1d7db;border-top-color:#00a884;border-radius:50%;display:inline-block;animation:spin .8s linear infinite;margin-right:6px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* BOTTOM DOWNLOAD BANNER */
  .bottom-banner{background:#f0f2f5;padding:16px;display:flex;align-items:center;justify-content:center;gap:10px}
  .bottom-download-btn{background:#25D366;color:#fff;border:none;border-radius:24px;padding:11px 32px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;text-decoration:none}

<!-- MAIN CONTENT -->
<div class="content">
  <div class="group-icon-wrap">
    <img src="group-icon.jpg" alt="Group icon" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
    <div class="group-icon-fallback" style="display:none">🎓</div>
  </div>

  <div class="group-name">NSUK Aspirants³ (Main Group)</div>
  <div class="group-sub">WhatsApp Group Invite</div>

  <button class="join-btn" id="joinBtn" onclick="goToWhatsApp()">Join Chat</button>

  <div class="redirect-msg" id="redirectMsg"><span class="spinner"></span> Opening WhatsApp in a moment...</div>

  <div class="divider-line"></div>

  <a href="https://www.whatsapp.com/download" class="download-link" target="_blank" rel="noopener">Download</a>
</div>

<!-- BOTTOM BANNER -->
<div class="bottom-banner">
  <a href="https://www.whatsapp.com/download" class="bottom-download-btn" target="_blank" rel="noopener">
    Download <span>⬇</span>
  </a>
</div>

<script>
const WA_LINK = 'https://chat.whatsapp.com/Ipi4vQYbmF971ZGTyhKxu3';

function goToWhatsApp(){
  window.location.href = WA_LINK;
}

// Auto-redirect after 4 seconds
let countdown = setTimeout(goToWhatsApp, 4000);

// If user taps Join Chat manually, cancel the auto-redirect timer (avoids double trigger)
document.getElementById('joinBtn').addEventListener('click', () => clearTimeout(countdown));
</script>
