function log(msg, cls=''){
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.startSeed = async function(){
  const btn = document.getElementById('seedBtn');
  btn.disabled = true;
  log('🚀 Starting upload...', 'info');
  let total = 0, success = 0;

  for(const faculty of NSUK_DATA){
    for(const course of faculty.courses){
      total++;
      const id = (faculty.faculty + '_' + course.name).replace(/[^a-zA-Z0-9]/g, '_');
      try {
        await setDoc(doc(db, 'courses', id), {
          faculty: faculty.faculty,
          name: course.name,
          cutoff: course.cutoff,
          jamb_compulsory: course.jamb.compulsory,
          jamb_optional_pick: course.jamb.optional_pick,
          jamb_optional: course.jamb.optional,
          olevel_compulsory: course.olevel.compulsory,
          olevel_optional_pick: course.olevel.optional_pick,
          olevel_optional: course.olevel.optional
        });
        success++;
        log(`✅ ${faculty.faculty} — ${course.name}`, 'ok');
      } catch(e) {
        log(`❌ Failed: ${course.name} — ${e.message}`, 'err');
      }
    }
  }
  log(`<br><strong>Done! ${success}/${total} courses uploaded.</strong>`, success===total?'ok':'err');
  btn.disabled = false;
}
</script>
