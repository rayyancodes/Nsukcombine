<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NSUK Aspirants – Announcements</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --wa-bg: #0b1416;
    --wa-chat-bg: #0d1117;
    --wa-header: #1f2c34;
    --wa-header-border: #2a3942;
    --wa-bubble-admin: #1e2e35;
    --wa-bubble-admin-border: #2a3d45;
    --wa-text: #e9edef;
    --wa-text-dim: #8696a0;
    --wa-text-meta: #667781;
    --wa-green: #00a884;
    --wa-system-bg: rgba(17,27,33,0.85);
    --wa-name-admin: #53bdeb;
    --reaction-bg: #1f2c34;
  }
  html, body { height: 100%; background: var(--wa-bg); font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

  .phone-shell { max-width: 430px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; background: var(--wa-chat-bg); box-shadow: 0 0 60px rgba(0,0,0,0.7); }

  /* HEADER */
  .wa-header { background: var(--wa-header); padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--wa-header-border); position: sticky; top: 0; z-index: 10; flex-shrink: 0; }
  .wa-header .back-arrow { color: var(--wa-text); font-size: 22px; cursor: pointer; text-decoration: none; line-height: 1; }
  .wa-header .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #005c4b 0%, #128c7e 60%, #25d366 100%); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; border: 2px solid #25d366; }
  .wa-header .info { flex: 1; min-width: 0; }
  .wa-header .info .name { font-size: 15.5px; font-weight: 600; color: var(--wa-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wa-header .info .sub { font-size: 12px; color: var(--wa-text-dim); margin-top: 1px; }
  .wa-header .icons { display: flex; gap: 18px; align-items: center; color: var(--wa-text-dim); font-size: 19px; }

  /* BODY */
  .wa-body { flex: 1; overflow-y: auto; padding: 8px 0 12px; background: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 20px), var(--wa-chat-bg); scroll-behavior: smooth; }
  .wa-body::-webkit-scrollbar { width: 4px; }
  .wa-body::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 4px; }

  /* SYSTEM */
  .sys-msg { text-align: center; margin: 10px 16px; }
  .sys-msg span { display: inline-block; background: var(--wa-system-bg); color: var(--wa-text-dim); font-size: 11.5px; padding: 5px 12px; border-radius: 7px; line-height: 1.4; }

  /* DATE DIVIDER */
  .date-divider { text-align: center; margin: 14px 16px 8px; }
  .date-divider span { display: inline-block; background: var(--wa-system-bg); color: var(--wa-text-dim); font-size: 12px; padding: 4px 14px; border-radius: 8px; }

  /* BUBBLE */
  .msg-row { display: flex; padding: 2px 8px; align-items: flex-end; gap: 6px; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .msg-row.admin { justify-content: flex-start; }
  .bubble-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, #005c4b, #128c7e); display: flex; align-items: center; justify-content: center; font-size: 14px; margin-bottom: 18px; }
  .bubble { max-width: 82%; border-radius: 8px; padding: 6px 9px 8px; position: relative; word-break: break-word; line-height: 1.45; background: var(--wa-bubble-admin); border-top-left-radius: 0; border: 1px solid var(--wa-bubble-admin-border); }
  .bubble::before { content: ''; position: absolute; top: 0; left: -8px; width: 0; height: 0; border-top: 8px solid var(--wa-bubble-admin); border-left: 8px solid transparent; }
  .bubble .sender-name { font-size: 13px; font-weight: 600; color: var(--wa-name-admin); margin-bottom: 2px; }
  .badge { display: inline-block; font-size: 10px; background: rgba(0,168,132,0.2); color: var(--wa-green); border: 1px solid rgba(0,168,132,0.3); border-radius: 4px; padding: 1px 5px; margin-left: 4px; font-weight: 600; }
  .msg-text { font-size: 14.5px; color: var(--wa-text); white-space: pre-wrap; }
  .msg-text a { color: var(--wa-green); }

  /* IMAGE bubble */
  .msg-image { width: 100%; max-width: 280px; border-radius: 6px; display: block; margin-bottom: 4px; cursor: pointer; }

  /* CAPTION */
  .img-caption { font-size: 14px; color: var(--wa-text); margin-top: 4px; white-space: pre-wrap; }

  /* META */
  .msg-meta { display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-top: 3px; }
  .msg-time { font-size: 11px; color: var(--wa-text-meta); }
  .ticks { font-size: 13px; color: var(--wa-green); }

  /* REACTIONS */
  .reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; margin-left: 34px; }
  .reaction-pill { display: inline-flex; align-items: center; gap: 3px; background: var(--reaction-bg); border: 1px solid #2a3942; border-radius: 999px; padding: 3px 8px; font-size: 13px; cursor: pointer; user-select: none; transition: border-color .2s; }
  .reaction-pill:hover { border-color: var(--wa-green); }
  .reaction-pill.reacted { border-color: var(--wa-green); background: rgba(0,168,132,0.1); }
  .r-count { font-size: 12px; color: var(--wa-text-dim); }

  /* EMOJI PICKER */
  .emoji-picker { display: none; flex-wrap: wrap; gap: 6px; background: var(--wa-header); border: 1px solid var(--wa-header-border); border-radius: 12px; padding: 8px 10px; margin-top: 4px; margin-left: 34px; }
  .emoji-picker.open { display: flex; }
  .emoji-opt { font-size: 20px; cursor: pointer; padding: 3px; border-radius: 6px; transition: background .15s; }
  .emoji-opt:hover { background: rgba(255,255,255,.1); }
  .add-reaction-btn { display: inline-flex; align-items: center; justify-content: center; background: var(--reaction-bg); border: 1px solid #2a3942; border-radius: 999px; padding: 3px 8px; font-size: 16px; cursor: pointer; color: var(--wa-text-dim); }
  .add-reaction-btn:hover { border-color: var(--wa-green); }

  /* IMAGE LIGHTBOX */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
  .lightbox-close { position: absolute; top: 16px; right: 16px; color: #fff; font-size: 28px; cursor: pointer; background: rgba(0,0,0,.5); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }

  /* TYPING */
  .typing-row { display: flex; align-items: flex-end; gap: 6px; padding: 4px 8px; }
  .typing-bubble { background: var(--wa-bubble-admin); border: 1px solid var(--wa-bubble-admin-border); border-radius: 8px; border-top-left-radius: 0; padding: 10px 14px; display: flex; gap: 4px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--wa-text-dim); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* SCROLL BTN */
  .scroll-btn { position: absolute; bottom: 56px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: var(--wa-header); border: 1px solid var(--wa-header-border); color: var(--wa-text); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; opacity: 0; transition: opacity .2s; z-index: 5; }

  /* FOOTER */
  .wa-footer { background: var(--wa-header); border-top: 1px solid var(--wa-header-border); padding: 10px 16px; text-align: center; font-size: 13px; color: var(--wa-text-dim); flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 6px; }

  /* LOADING */
  .chat-loading { text-align: center; padding: 40px 16px; color: var(--wa-text-dim); font-size: 14px; }
</style>
</head>
<body>

<div class="phone-shell">
  <!-- HEADER -->
  <div class="wa-header">
    <a class="back-arrow" href="index.html">‹</a>
    <div class="avatar">🎓</div>
    <div class="info">
      <div class="name">NSUK 2026 Aspirants</div>
      <div class="sub" id="memberCount">Loading...</div>
    </div>
    <div class="icons"><span title="Info">⋮</span></div>
  </div>

  <!-- CHAT BODY -->
  <div class="wa-body" id="chatBody">
    <div class="sys-msg"><span>Messages and calls are end-to-end encrypted. No one outside of this chat, not even WhatsApp, can read or listen to them.</span></div>
    <div class="chat-loading" id="chatLoading">⏳ Loading announcements...</div>
    <div id="messagesContainer"></div>
    <div class="typing-row" id="typingRow" style="display:none">
      <div class="bubble-avatar">🧑</div>
      <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>

  <div class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">↓</div>

  <!-- FOOTER -->
  <div class="wa-footer">
    <span>🔒</span><span>Only admins can send messages</span>
  </div>
</div>

<!-- IMAGE LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">✕</div>
  <img id="lightboxImg" src="" alt="">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlSUVjCQVnOuzDj0kuDu0ISPD50-G10YM",
  authDomain: "nsuk-combination.firebaseapp.com",
  projectId: "nsuk-combination",
  storageBucket: "nsuk-combination.firebasestorage.app",
  messagingSenderId: "1009558767395",
  appId: "1:1009558767395:web:1a208eb6e7befa4632ae96"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const EMOJIS = ['👍','❤️','😮','😂','😢','🙏','🔥','💯'];

// Unique visitor ID for reaction tracking
function getVisitorId(){
  let id = localStorage.getItem('nsuk_visitor_id');
  if(!id){ id = 'v_' + Math.random().toString(36).substr(2,12); localStorage.setItem('nsuk_visitor_id', id); }
  return id;
}
const VISITOR_ID = getVisitorId();

// Format timestamp
function formatTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}
function formatDate(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const today = new Date(); const yesterday = new Date(); yesterday.setDate(today.getDate()-1);
  if(d.toDateString()===today.toDateString()) return 'Today';
  if(d.toDateString()===yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
}

let lastDate = '';
let msgCount = 0;

function renderMessage(id, data){
  const container = document.getElementById('messagesContainer');

  // Date divider
  const dateStr = formatDate(data.timestamp);
  if(dateStr !== lastDate){
    lastDate = dateStr;
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.innerHTML = `<span>${dateStr}</span>`;
    container.appendChild(div);
  }

  const row = document.createElement('div');
  row.className = 'msg-row admin';
  row.id = 'msg-' + id;
  row.style.animationDelay = (msgCount * 0.05) + 's';
  msgCount++;

  // Bubble content
  let bubbleContent = `<div class="sender-name">~ Raayan <span class="badge">Admin</span></div>`;

  if(data.imageUrl){
    bubbleContent += `<img class="msg-image" src="${data.imageUrl}" alt="announcement image" onclick="openLightbox('${data.imageUrl}')">`;
    if(data.text) bubbleContent += `<div class="img-caption">${linkify(data.text)}</div>`;
  } else {
    bubbleContent += `<div class="msg-text">${linkify(data.text)}</div>`;
  }

  bubbleContent += `<div class="msg-meta"><span class="msg-time">${formatTime(data.timestamp)}</span><span class="ticks">✓✓</span></div>`;

  // Reactions
  const reactions = data.reactions || {};
  let reactionHTML = '';
  EMOJIS.forEach(emoji => {
    const voters = reactions[btoa(emoji)] || [];
    if(voters.length > 0){
      const reacted = voters.includes(VISITOR_ID) ? 'reacted' : '';
      reactionHTML += `<div class="reaction-pill ${reacted}" onclick="toggleReaction('${id}','${emoji}')">
        ${emoji} <span class="r-count">${voters.length.toLocaleString()}</span>
      </div>`;
    }
  });

  row.innerHTML = `
    <div class="bubble-avatar">🧑</div>
    <div>
      <div class="bubble">${bubbleContent}</div>
      <div class="reactions" id="reactions-${id}">
        ${reactionHTML}
        <div class="add-reaction-btn" onclick="togglePicker('${id}')">😊</div>
      </div>
      <div class="emoji-picker" id="picker-${id}">
        ${EMOJIS.map(e => `<div class="emoji-opt" onclick="toggleReaction('${id}','${e}')">${e}</div>`).join('')}
      </div>
    </div>`;

  container.appendChild(row);
}

// Re-render reactions only
function updateReactions(id, reactions){
  const container = document.getElementById('reactions-' + id);
  if(!container) return;
  let html = '';
  EMOJIS.forEach(emoji => {
    const voters = reactions[btoa(emoji)] || [];
    if(voters.length > 0){
      const reacted = voters.includes(VISITOR_ID) ? 'reacted' : '';
      html += `<div class="reaction-pill ${reacted}" onclick="toggleReaction('${id}','${emoji}')">
        ${emoji} <span class="r-count">${voters.length.toLocaleString()}</span>
      </div>`;
    }
  });
  html += `<div class="add-reaction-btn" onclick="togglePicker('${id}')">😊</div>`;
  container.innerHTML = html;
}

// Linkify URLs
function linkify(text){
  if(!text) return '';
  return text.replace(/https?:\/\/[^\s]+/g, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
}

// Toggle emoji reaction
window.toggleReaction = async function(msgId, emoji){
  // Close picker
  const picker = document.getElementById('picker-' + msgId);
  if(picker) picker.classList.remove('open');

  const ref = doc(db, 'announcements', msgId);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;

  const data = snap.data();
  const reactions = data.reactions || {};
  const key = btoa(emoji);
  const voters = reactions[key] || [];

  if(voters.includes(VISITOR_ID)){
    reactions[key] = voters.filter(v => v !== VISITOR_ID);
  } else {
    reactions[key] = [...voters, VISITOR_ID];
  }

  await updateDoc(ref, { reactions });
  updateReactions(msgId, reactions);
};

window.togglePicker = function(id){
  document.querySelectorAll('.emoji-picker.open').forEach(p => { if(p.id !== 'picker-'+id) p.classList.remove('open'); });
  document.getElementById('picker-' + id)?.classList.toggle('open');
};

// Load messages
const q = query(collection(db, 'announcements'), orderBy('timestamp', 'asc'));
onSnapshot(q, snap => {
  document.getElementById('chatLoading').style.display = 'none';

  snap.docChanges().forEach(change => {
    if(change.type === 'added'){
      renderMessage(change.doc.id, change.doc.data());
      // Update member count display
      msgCount++;
    }
    if(change.type === 'modified'){
      // Only update reactions
      updateReactions(change.doc.id, change.doc.data().reactions || {});
    }
    if(change.type === 'removed'){
      const el = document.getElementById('msg-' + change.doc.id);
      if(el) el.remove();
    }
  });

  // Update sub header
  document.getElementById('memberCount').textContent = snap.size + ' announcements';
  scrollToBottom();
});

// Scroll
window.scrollToBottom = function(){
  const body = document.getElementById('chatBody');
  body.scrollTop = body.scrollHeight;
};
const scrollBtn = document.getElementById('scrollBtn');
document.getElementById('chatBody').addEventListener('scroll', function(){
  const dist = this.scrollHeight - this.scrollTop - this.clientHeight;
  scrollBtn.style.opacity = dist > 120 ? '1' : '0';
  scrollBtn.style.pointerEvents = dist > 120 ? 'auto' : 'none';
});

// Lightbox
window.openLightbox = function(url){
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox = function(){
  document.getElementById('lightbox').classList.remove('open');
};
</script>
</body>
</html>
